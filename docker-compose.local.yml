services:
    np_mysql:
        container_name: np_mysql
        image: mysql:8.0.33
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=myPassWord
            - MYSQL_DATABASE=test
        networks:
            - np_network
        volumes:
            - db_vol:/var/lib/mysql
        # - .backup-db:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmyPassWord"]
            interval: 5s
            timeout: 5s
            retries: 15
            start_period: 30s

    np_redis:
        container_name: np_redis
        image: redis:7.4.1-alpine
        restart: always
        volumes:
            - redis_vol:/data
        environment:
            - REDIS_PASSWORD=1234567
        networks:
            - np_network

    np_api:
        container_name: np_api
        depends_on:
            np_redis:
                condition: service_started
            np_mysql:
                condition: service_healthy
        build:
            context: .
            dockerfile: Dockerfile
            target: dev
        restart: always
        ports:
            - 4000:4000
        networks:
            - np_network

volumes:
    db_vol:
    redis_vol:

networks:
    np_network:
        name: np_network
        driver: bridge
