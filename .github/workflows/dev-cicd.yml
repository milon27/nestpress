name: Dev CI CD

on:
    push:
        branches: [dev]
    pull_request:
        branches: [dev]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: PNPM Install
              uses: pnpm/action-setup@v4
              with:
                  version: 11.5.2

            - name: Deps Install
              run: |
                  pnpm install --frozen-lockfile

            - name: Lint Check
              run: |
                  NODE_OPTIONS="--max-old-space-size=8192" pnpm lint:check

            - name: Test
              run: |
                  pnpm test

            - name: Build
              run: |
                  pnpm build
